<link
rel="stylesheet"

href="{{url_for(
'static',
filename='style.css'
)}}">
<h1 class="edit-title">

Edit Student

</h1>

<div class="edit-card">

<form method="POST">

Name

<input
name="name"
value="{{student.name}}">

<br><br>

Course

<input
name="course"
value="{{student.course}}">

<br><br>

Batch

<select
name="batch">

{% for b in batches %}

<option
value="{{b}}"

{% if b==student.batch_time %}

selected

{% endif %}

>

{{b}}

</option>

{% endfor %}

</select>

<br><br>

PC

<select name="pc" id="pc-select">

{% for x in range(1,6) %}

<option
value="{{x}}"

{% if x==student.computer_no %}
selected
{% endif %}

{% if x in used_pcs %}
disabled
style="color:gray;background:#222;"
{% endif %}

>

PC {{x}}

{% if x in used_pcs %}
(Occupied)
{% endif %}

</option>

{% endfor %}

</select>

<br><br>

<div class="days-section">

<label>Days</label>

<div class="schedule-options">

<label class="schedule-card">

<input
type="radio"
name="schedule"
onclick="setMWF()">

<span>📅 MWF</span>

</label>

<label class="schedule-card">

<input
type="radio"
name="schedule"
onclick="setTTS()">

<span>📅 TTS</span>

</label>

<label class="schedule-card">

<input
type="radio"
name="schedule"
onclick="setDaily()">

<span>⚡ Daily</span>

</label>

</div>

</div>

<br><br>

<input
hidden
name="days"
id="days">

<button>

Save

</button>

</form>

</form>

</div>


<script>

function setMWF(){

document
.getElementById(
"days"
)
.value=

"Monday,Wednesday,Friday"

}

function setTTS(){

document
.getElementById(
"days"
)
.value=

"Tuesday,Thursday,Saturday"

}

function setDaily(){

document
.getElementById(
"days"
)
.value=

"Monday,Tuesday,Wednesday,Thursday,Friday,Saturday"

}

const occupiedData = {{ occupied|tojson }}

function updatePCs(){

    let selectedBatch =
    document.querySelector(
    'select[name="batch"]'
    ).value

    let selectedDays =
    document.getElementById(
    "days"
    ).value

    let pcSelect =
    document.getElementById(
    "pc-select"
    )

    let currentPC =
    parseInt("{{student.computer_no}}")

    let originalBatch =
    "{{student.batch_time}}"

    let originalDays =
    "{{current|join(',')}}"

    let isOriginalSlot =

    selectedBatch === originalBatch
    &&
    selectedDays === originalDays

    let selectedDayArray =
    selectedDays.split(",")

    for(let option of pcSelect.options){

        let pc =
        parseInt(option.value)

        option.disabled = false

        option.innerText =
        "PC "+pc

        let occupied =
        occupiedData.some(s=>{

            let studentDays =
            s.days.split(",")

            let sameDay =
            selectedDayArray.some(day=>
                studentDays.includes(day)
            )

            return (

                s.batch === selectedBatch
                &&
                sameDay
                &&
                s.pc === pc
                &&
                !(

                    pc === currentPC
                    &&
                    isOriginalSlot

                )

            )

        })

        if(

            pc === currentPC
            &&
            isOriginalSlot

        ){

            option.innerText =
            "PC "+pc+" (Current)"

        }

        if(occupied){

            option.innerText =
            "PC "+pc+" (Occupied)"

            option.disabled = true

        }

    }

}

function setMWF(){

document.getElementById(
"days"
).value=

"Monday,Wednesday,Friday"

updatePCs()

}

function setTTS(){

document.getElementById(
"days"
).value=

"Tuesday,Thursday,Saturday"

updatePCs()

}

function setDaily(){

document.getElementById(
"days"
).value=

"Monday,Tuesday,Wednesday,Thursday,Friday,Saturday"

updatePCs()

}

document.querySelector(
'select[name="batch"]'
).addEventListener(
"change",
updatePCs
)

window.onload=function(){

updatePCs()

}

</script>
